<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTRO</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="img/icono.png" type="image/x-icon">
</head>
<body>
    <section class="registro">
        <h1 class="title">REGISTRAR USUARIO</h1>
        <form class="registro_form">
            <div>
                <label for="nombre">Nombre Completo: </label>
                <input type="text" placeholder="Ej. Juan Perez" class="in_name" required>
            </div>
            <div>
                <label for="correo">Coreo Electronico: </label>
                <input type="email" placeholder="Ej. usuario@dominio.tld" class="in_email" required>
            </div>
            
            <div>
                <label for="contrasena" class="lebel_pwd">Contraseña: </label>
                <input type="password" class="in_pwd" required>
            </div>

            <div>
                <label for="contrasena" class="lebel_pwd">Confirmar Contraseña: </label>
                <input type="password"class="in_pwd" required>
            </div>
            <button class="button_crear">CREAR CUENTA</button>
        </form>
    </section>
    
    
</body>
</html>
