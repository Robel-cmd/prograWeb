<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section>
        <form action="perfil">
            <div  id="perfil">
                <img src="img/perfil.png" alt="foto_perfil">

            </div>
            <div>
                <label for="foto_perfil" class="campo_l">FOTO DE PERFIL</label>
                <br>
                <input type="file" class="campo_i">
            </div>
            <div>
                <label for="fecha" class="campo_l">FECHA NACIMIENTO</label>
                <input type="date" class="campo_i">
            </div>
            <div>
                <label for="HTML" class="campo_l">
                    <input type="checkbox" class="campo_i">HTML
                </label>
                <label for="CSS" class="campo_l">
                    <input type="checkbox" class="campo_i"> CSS
                </label>
                <label for="HTML" class="campo_l">
                    <input type="checkbox" class="campo_i"> C++
                </label>
                <label for="CSS" class="campo_l">
                    <input type="checkbox" class="campo_i"> JAVA
                </label>
            </div>

        </form>
        
    </section>
    
</body>
</html>
